_format_version: "2.1"

# API gateway: routes the single public URL to the Supabase services.
# JWTs are validated by each service (GoTrue/PostgREST/Storage) themselves,
# so the gateway only proxies + handles CORS.

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1
        strip_path: true
        paths:
          - /auth/v1/

  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1
        strip_path: true
        paths:
          - /rest/v1/

  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1
        strip_path: true
        paths:
          - /storage/v1/

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Authorization
        - Content-Type
        - apikey
        - x-client-info
        - x-supabase-api-version
        - Range
        - Prefer
      exposed_headers:
        - Content-Range
        - Content-Profile
      credentials: false
      max_age: 3600
